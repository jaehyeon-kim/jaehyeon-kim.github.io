<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/theme/{{ .Params.reveal_theme | default "black" }}.css" id="theme">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/highlight/monokai.css">
</head>
<body>
    <div class="reveal">
        <div class="slides">
            <section data-markdown 
                     data-separator="^---" 
                     data-separator-vertical="^--">
                <textarea data-template>
{{ .RawContent }}
                </textarea>
            </section>
        </div>
    </div>

    <!-- Core Reveal.js -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.js"></script>
    <!-- Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/highlight/highlight.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/math/math.js"></script>
    <!-- Mermaid Plugin for Reveal.js (Robust version) -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js-mermaid-plugin@1.1.0/plugin/mermaid/mermaid.js"></script>

    <script>
        Reveal.initialize({
            plugins: [ RevealMarkdown, RevealHighlight, RevealMath.MathJax3, RevealMermaid ],
            hash: true,
            slideNumber: 'c/t',
            transition: 'convex',
            // Mermaid config
            mermaid: {
                flowchart: { curve: 'linear' },
                theme: 'dark'
            }
        });
    </script>
</body>
</html>
